<!doctype html>
<html lang="zh-CN">

    <title>全班成绩总览</title>
    <style>
:root {
  --bg: #f6f8fb;
  --surface: #ffffff;
  --surface-soft: #f9fbfd;
  --text: #172033;
  --muted: #687386;
  --line: #e6ebf2;
  --blue: #2563eb;
  --blue-soft: #eaf1ff;
  --red: #d93025;
  --red-soft: #fff0ee;
  --green: #168a46;
  --green-soft: #ecf9f1;
  --amber: #a16207;
  --shadow: 0 18px 45px rgba(28, 45, 75, 0.08);
  --radius: 8px;
  color-scheme: light;
  font-family: Inter, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
}

button,
input,
select {
  font: inherit;
}

button {
  cursor: pointer;
}

.app-shell {
  min-height: 100vh;
}

.topbar {
  position: sticky;
  top: 0;
  z-index: 10;
  border-bottom: 1px solid rgba(230, 235, 242, 0.82);
  background: rgba(255, 255, 255, 0.92);
  backdrop-filter: blur(16px);
}

.topbar-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
  width: min(1180px, calc(100% - 36px));
  margin: 0 auto;
  padding: 15px 0;
}

.brand {
  display: flex;
  align-items: center;
  gap: 11px;
  min-width: 0;
}

.brand-mark {
  display: grid;
  width: 34px;
  height: 34px;
  place-items: center;
  border-radius: 8px;
  background: var(--blue);
  color: #fff;
  font-weight: 800;
  letter-spacing: 0;
}

.brand h1 {
  margin: 0;
  font-size: 18px;
  line-height: 1.2;
}

.brand p {
  margin: 3px 0 0;
  color: var(--muted);
  font-size: 12px;
}

.nav-actions {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  flex-wrap: wrap;
  gap: 10px;
}

.search,
.sort-select {
  width: 220px;
  height: 38px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface-soft);
  color: var(--text);
  outline: none;
  padding: 0 12px;
}

.sort-select {
  width: auto;
  min-width: 150px;
  appearance: none;
}

.search:focus,
.sort-select:focus {
  border-color: rgba(37, 99, 235, 0.42);
  box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
}

.ghost-button {
  height: 38px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fff;
  color: var(--text);
  padding: 0 13px;
}

.file-input {
  display: none;
}

.page {
  width: min(1180px, calc(100% - 36px));
  margin: 0 auto;
  padding: 28px 0 44px;
}

.hero {
  display: grid;
  grid-template-columns: minmax(0, 1.4fr) minmax(280px, 0.6fr);
  gap: 22px;
  align-items: stretch;
  margin-bottom: 22px;
}

.summary-panel,
.detail-panel,
.table-panel {
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--surface);
  box-shadow: var(--shadow);
}

.summary-panel {
  padding: 26px;
}

.summary-panel h2,
.detail-title h2 {
  margin: 0;
  font-size: 28px;
  line-height: 1.16;
  letter-spacing: 0;
}

.summary-panel p {
  max-width: 740px;
  margin: 10px 0 0;
  color: var(--muted);
  line-height: 1.7;
}

.metric-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 12px;
  margin-top: 24px;
}

.metric {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface-soft);
  padding: 14px;
}

.metric span {
  display: block;
  color: var(--muted);
  font-size: 12px;
}

.metric strong {
  display: block;
  margin-top: 7px;
  font-size: 24px;
  line-height: 1.15;
}

.rank-panel {
  padding: 20px;
}

.rank-panel h3,
.section-title h3 {
  margin: 0;
  font-size: 16px;
}

.rank-list {
  display: grid;
  gap: 10px;
  margin-top: 16px;
}

.rank-item {
  display: grid;
  grid-template-columns: 28px 1fr auto;
  gap: 10px;
  align-items: center;
  border-radius: 8px;
  background: var(--surface-soft);
  padding: 10px;
}

.rank-num {
  display: grid;
  width: 28px;
  height: 28px;
  place-items: center;
  border-radius: 8px;
  background: var(--blue-soft);
  color: var(--blue);
  font-weight: 800;
}

.rank-name {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-weight: 700;
}

.rank-score {
  color: var(--muted);
  font-size: 13px;
}

.section-title {
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: 12px;
  margin: 24px 0 12px;
}

.section-title p {
  margin: 0;
  color: var(--muted);
  font-size: 13px;
}

.table-panel {
  overflow: hidden;
}

.table-scroll {
  overflow: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 1120px;
}

th,
td {

  padding: 12px 11px;
  text-align: right;
  white-space: nowrap;
  font-size: 13px;

th {

th:first-child,
td:first-child,
th:nth-child(2),
td:nth-child(2),
th:nth-child(3),
td:nth-child(3) {

tbody tr {

tbody tr:hover {

.student-link {

.diff-positive {

.diff-negative {

.diff-zero {

.detail-layout {

.detail-panel {

}

.chart-wrap {

.chart {

.axis-label {

}

.chart-line {

}

.median-line {

  stroke-dasharray: 5 5;
}

.chart-dot {
  fill: #fff;
  stroke: var(--blue);
  stroke-width: 3;
}

.score-list {
  display: grid;
  gap: 10px;
}

.score-card {
  display: grid;

  gap: 8px;
  align-items: center;

  border-radius: 8px;

.score-card strong {

.score-card small {

.score-value {

.legend {

  flex-wrap: wrap;
  gap: 12px;
  margin-top: 12px;
  color: var(--muted);
  font-size: 12px;
}

.legend span {

  align-items: center;
  gap: 7px;
}

.legend i {

  background: var(--blue);

.empty-state {

  border-radius: 8px;
  background: #fff;
  padding: 34px;

.table-tools {

  flex-wrap: wrap;
  align-items: center;
  justify-content: flex-end;
  gap: 10px 14px;

.table-tools label {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: var(--muted);
  font-size: 13px;

  .nav-actions {

@media (max-width: 560px) {

    grid-template-columns: 1fr;
  }

  .chart-wrap {
    height: 280px;
  }

  table {
    min-width: 1040px;
  }
}

function cloneStudent(student) {
  return { id: student.id, name: student.name, scores: [...student.scores] };
}

function compactNumber(value) {
  if (value === null || value === undefined || Number.isNaN(value)) return "-";
  return Number.isInteger(value) ? String(value) : value.toFixed(1);
}

function parseNumber(value) {
  if (value === null || value === undefined) return null;
  const text = String(value).trim();
  if (!text || text === "-") return null;
  const num = Number(text.replace(/,/g, ""));
  return Number.isFinite(num) ? num : null;
}

function median(values) {
  const nums = values.filter((value) => typeof value === "number").sort((a, b) => a - b);
  const middle = Math.floor(nums.length / 2);
  if (!nums.length) return null;
  return nums.length % 2 ? nums[middle] : (nums[middle - 1] + nums[middle]) / 2;
}

function pointFor(score) {
  if (typeof score !== "number") return 0;
  if (score >= 95) return 3;
  if (score >= 90) return 2;
  if (score >= 85) return 1;
  return 0;
}

function getStats() {
  const medians = tests.map((_, index) => median(rawStudents.map((student) => student.scores[index])));
  const students = rawStudents.map((student) => {
    const validScores = student.scores.filter((score) => typeof score === "number");
    const totalPoints = student.scores.reduce((sum, score) => sum + pointFor(score), 0);
    const average = validScores.length ? validScores.reduce((sum, score) => sum + score, 0) / validScores.length : 0;
    const diffs = student.scores.map((score, index) => (typeof score === "number" ? score - medians[index] : null));
    return { ...student, totalPoints, average, diffs };
  });
  return { medians, students: sortStudents(students) };
}

function sortStudents(students) {
  const sorted = [...students];
  if (sortMode === "points") {
    return sorted.sort((a, b) => b.totalPoints - a.totalPoints || b.average - a.average || a.id - b.id);
  }
  if (sortMode.startsWith("test-")) {
    const index = Number(sortMode.replace("test-", ""));
    return sorted.sort((a, b) => (b.scores[index] ?? -Infinity) - (a.scores[index] ?? -Infinity) || b.totalPoints - a.totalPoints || a.id - b.id);
  }
  return sorted.sort((a, b) => a.id - b.id || a.name.localeCompare(b.name, "zh-Hans-CN"));
}

function currentStudentName() {
  const params = new URLSearchParams(location.hash.replace(/^#\/?/, ""));
  return params.get("student");
}

function setStudent(name) {
  if (name) {
    location.hash = `student=${encodeURIComponent(name)}`;
  } else {
    history.pushState("", document.title, location.pathname + location.search);
    render();
  }
}

function diffClass(diff) {
  if (diff === null) return "diff-zero";
  if (diff > 0) return "diff-positive";
  if (diff < 0) return "diff-negative";
  return "diff-zero";
}

function formatDiff(diff) {
  if (diff === null) return "-";
  if (Math.abs(diff) < 0.01) return "0";
  return `${diff > 0 ? "+" : ""}${compactNumber(diff)}`;
}

function scoreBand(score) {
  const point = pointFor(score);
  if (score === null) return "缺考";
  if (point === 3) return "3分档";
  if (point === 2) return "2分档";
  if (point === 1) return "1分档";
  return "未得分";
}

    </div>
  `;
  const search = app.querySelector(".search");
  search.addEventListener("input", (event) => {
    updateSearch(event.target.value);
  });
  if (options.focusSearch) {
    requestAnimationFrame(() => {
      const nextSearch = app.querySelector(".search");
      nextSearch.focus();
      nextSearch.setSelectionRange(nextSearch.value.length, nextSearch.value.length);
    });
  }
  app.querySelector('[data-action="home"]').addEventListener("click", () => setStudent(null));
  app.querySelector('[data-action="export"]').addEventListener("click", exportExcel);
  app.querySelector('[data-action="import"]').addEventListener("click", () => app.querySelector(".file-input").click());
  app.querySelector(".file-input").addEventListener("change", importExcel);
}

function updateSearch(value) {
  searchTerm = value;
  window.clearTimeout(searchTimer);
  searchTimer = window.setTimeout(() => {
    if (currentStudentName()) {
      history.pushState("", document.title, location.pathname + location.search);
    }
    render({ focusSearch: true });
  }, 180);
}

function escapeHtml(value) {
  return String(value).replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" })[char]);
}

        <div class="metric-grid">

            ${tests.map((test, index) => `<option value="test-${index}"${sortMode === `test-${index}` ? " selected" : ""}>${escapeHtml(test)}成绩降序</option>`).join("")}

function matchesSearch(student) {
  const term = searchTerm.trim().toLowerCase();
  if (!term) return true;
  const aliases = nameAliases[student.name] || [];
  return [student.name, String(student.id), ...aliases].some((value) => value.toLowerCase().includes(term));
}

function sortStudentsForRank(students) {
  return [...students].sort((a, b) => b.totalPoints - a.totalPoints || b.average - a.average || a.id - b.id);
}

function bindStudentButtons() {
  app.querySelectorAll("[data-student]").forEach((button) => {
    button.addEventListener("click", () => setStudent(button.dataset.student));
  });
}

function trendChart(student, medians) {
  const width = 860;
  const height = 340;
  const pad = { top: 24, right: 28, bottom: 62, left: 42 };
  const allValues = [...student.scores, ...medians].filter((value) => typeof value === "number");
  const min = Math.max(60, Math.floor(Math.min(...allValues) / 5) * 5 - 5);
  const max = 100;
  const x = (index) => pad.left + (index / (tests.length - 1 || 1)) * (width - pad.left - pad.right);
  const y = (value) => pad.top + ((max - value) / (max - min)) * (height - pad.top - pad.bottom);
  const lineFor = (values) =>
    values
      .map((value, index) => (typeof value === "number" ? `${index === 0 ? "M" : "L"} ${x(index).toFixed(1)} ${y(value).toFixed(1)}` : ""))
      .filter(Boolean)
      .join(" ");

  const grid = [60, 70, 80, 90, 100]
    .filter((tick) => tick >= min)
    .map(
      (tick) => `
      <line x1="${pad.left}" x2="${width - pad.right}" y1="${y(tick)}" y2="${y(tick)}" stroke="#edf1f6" />
      <text class="axis-label" x="8" y="${y(tick) + 4}">${tick}</text>
    `,
    )
    .join("");

  const dots = student.scores
    .map((score, index) => {
      if (typeof score !== "number") return "";
      return `<circle class="chart-dot" cx="${x(index)}" cy="${y(score)}" r="5"><title>${escapeHtml(tests[index])}：${compactNumber(score)}</title></circle>`;
    })
    .join("");

  const labels = tests
    .map((test, index) => `<text class="axis-label" text-anchor="middle" x="${x(index)}" y="${height - 24}">${escapeHtml(test)}</text>`)
    .join("");

  return `
    <svg class="chart" viewBox="0 0 ${width} ${height}" role="img" aria-label="${escapeHtml(student.name)}成绩趋势图">
      <rect x="0" y="0" width="${width}" height="${height}" rx="8" fill="#ffffff" />
      ${grid}
      <path class="median-line" d="${lineFor(medians)}" />
      <path class="chart-line" d="${lineFor(student.scores)}" />
      ${dots}
      ${labels}
    </svg>
  `;
}

function exportExcel() {
  const rows = [
    ["学号", "姓名", ...tests],
    ...rawStudents
      .slice()
      .sort((a, b) => a.id - b.id)
      .map((student) => [student.id, student.name, ...student.scores.map((score) => (score === null ? "" : score))]),
  ];
  const blob = createXlsxBlob(rows);
  downloadBlob(blob, "成绩导出.xlsx");
}

function createXlsxBlob(rows) {
  const files = new Map([
    ["[Content_Types].xml", contentTypesXml()],
    ["_rels/.rels", rootRelsXml()],
    ["xl/workbook.xml", workbookXml()],
    ["xl/_rels/workbook.xml.rels", workbookRelsXml()],
    ["xl/styles.xml", stylesXml()],
    ["xl/worksheets/sheet1.xml", sheetXml(rows)],
  ]);
  return new Blob([zipFiles(files)], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
}

function contentTypesXml() {
  return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
  <Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
  <Default Extension="xml" ContentType="application/xml"/>
  <Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>
  <Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>
  <Override PartName="/xl/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.styles+xml"/>
</Types>`;
}

function rootRelsXml() {
  return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/>
</Relationships>`;
}

function workbookXml() {
  return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">
  <sheets>
    <sheet name="成绩" sheetId="1" r:id="rId1"/>
  </sheets>
</workbook>`;
}

function workbookRelsXml() {
  return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/>
  <Relationship Id="rId2" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/>
</Relationships>`;
}

function stylesXml() {
  return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<styleSheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">
  <fonts count="2">
    <font><sz val="11"/><name val="Arial"/></font>
    <font><b/><sz val="11"/><name val="Arial"/></font>
  </fonts>
  <fills count="2">
    <fill><patternFill patternType="none"/></fill>
    <fill><patternFill patternType="gray125"/></fill>
  </fills>
  <borders count="1"><border><left/><right/><top/><bottom/><diagonal/></border></borders>
  <cellStyleXfs count="1"><xf numFmtId="0" fontId="0" fillId="0" borderId="0"/></cellStyleXfs>
  <cellXfs count="2">
    <xf numFmtId="0" fontId="0" fillId="0" borderId="0" xfId="0"/>
    <xf numFmtId="0" fontId="1" fillId="0" borderId="0" xfId="0" applyFont="1"/>
  </cellXfs>
  <cellStyles count="1"><cellStyle name="Normal" xfId="0" builtinId="0"/></cellStyles>
</styleSheet>`;
}

function sheetXml(rows) {
  const columnCount = Math.max(...rows.map((row) => row.length), 1);
  const columns = Array.from({ length: columnCount }, (_, index) => `<col min="${index + 1}" max="${index + 1}" width="${index < 2 ? 12 : 14}" customWidth="1"/>`).join("");
  const rowXml = rows
    .map((row, rowIndex) => {
      const cells = row
        .map((cell, colIndex) => cellXml(cell, rowIndex + 1, colIndex, rowIndex === 0))
        .join("");
      return `<row r="${rowIndex + 1}">${cells}</row>`;
    })
    .join("");
  return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">
  <cols>${columns}</cols>
  <sheetData>${rowXml}</sheetData>
</worksheet>`;
}

function cellXml(cell, rowNumber, colIndex, isHeader) {
  const ref = `${columnName(colIndex + 1)}${rowNumber}`;
  const style = isHeader ? ' s="1"' : "";
  if (typeof cell === "number" && Number.isFinite(cell)) {
    return `<c r="${ref}"${style}><v>${cell}</v></c>`;
  }
  const text = escapeXml(cell ?? "");
  return `<c r="${ref}" t="inlineStr"${style}><is><t>${text}</t></is></c>`;
}

function columnName(number) {
  let output = "";
  for (let current = number; current > 0; current = Math.floor((current - 1) / 26)) {
    output = String.fromCharCode(((current - 1) % 26) + 65) + output;
  }
  return output;
}

function escapeXml(value) {
  return String(value).replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&apos;" })[char]);
}

function zipFiles(files) {
  const encoder = new TextEncoder();
  const chunks = [];
  const central = [];
  let offset = 0;
  for (const [name, content] of files) {
    const nameBytes = encoder.encode(name);
    const data = encoder.encode(content);
    const crc = crc32(data);
    chunks.push(zipLocalHeader(nameBytes, data, crc), data);
    central.push(zipCentralHeader(nameBytes, data, crc, offset));
    offset += 30 + nameBytes.length + data.length;
  }
  const centralOffset = offset;
  const centralSize = central.reduce((sum, chunk) => sum + chunk.length, 0);
  return new Blob([...chunks, ...central, zipEndRecord(files.size, centralSize, centralOffset)]);
}

function zipLocalHeader(nameBytes, data, crc) {
  const header = new Uint8Array(30 + nameBytes.length);
  const view = new DataView(header.buffer);
  view.setUint32(0, 0x04034b50, true);
  view.setUint16(4, 20, true);
  view.setUint16(6, 0, true);
  view.setUint16(8, 0, true);
  view.setUint32(14, crc, true);
  view.setUint32(18, data.length, true);
  view.setUint32(22, data.length, true);
  view.setUint16(26, nameBytes.length, true);
  header.set(nameBytes, 30);
  return header;
}

function zipCentralHeader(nameBytes, data, crc, offset) {
  const header = new Uint8Array(46 + nameBytes.length);
  const view = new DataView(header.buffer);
  view.setUint32(0, 0x02014b50, true);
  view.setUint16(4, 20, true);
  view.setUint16(6, 20, true);
  view.setUint16(8, 0, true);
  view.setUint16(10, 0, true);
  view.setUint32(16, crc, true);
  view.setUint32(20, data.length, true);
  view.setUint32(24, data.length, true);
  view.setUint16(28, nameBytes.length, true);
  view.setUint32(42, offset, true);
  header.set(nameBytes, 46);
  return header;
}

function zipEndRecord(count, centralSize, centralOffset) {
  const header = new Uint8Array(22);
  const view = new DataView(header.buffer);
  view.setUint32(0, 0x06054b50, true);
  view.setUint16(8, count, true);
  view.setUint16(10, count, true);
  view.setUint32(12, centralSize, true);
  view.setUint32(16, centralOffset, true);
  return header;
}

function crc32(data) {
  let crc = 0xffffffff;
  for (const byte of data) {
    crc ^= byte;
    for (let index = 0; index < 8; index += 1) {
      crc = crc & 1 ? (crc >>> 1) ^ 0xedb88320 : crc >>> 1;
    }
  }
  return (crc ^ 0xffffffff) >>> 0;
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = filename;
  document.body.append(link);
  link.click();
  link.remove();
  URL.revokeObjectURL(url);
}

async function importExcel(event) {
  const file = event.target.files[0];
  event.target.value = "";
  if (!file) return;
  const rows = /\.xlsx$/i.test(file.name) ? await parseXlsx(file) : parseTextWorkbook(await file.text(), file.name);
  const imported = normalizeImportedRows(rows);
  if (!imported.students.length) {
    alert("没有识别到有效成绩数据。请使用列：学号、姓名、各次考试成绩。");
    return;
  }
  tests = imported.tests;
  rawStudents = imported.students;
  sortMode = "id";
  searchTerm = "";
  setStudent(null);
}

function parseTextWorkbook(text, filename) {
  return /\.csv$/i.test(filename) ? parseCsv(text) : parseTableText(text);
}

function parseTableText(text) {
  if (/<table[\s>]/i.test(text)) {
    const doc = new DOMParser().parseFromString(text, "text/html");
    const tableRows = [...doc.querySelectorAll("tr")];
    return tableRows.map((row) => [...row.children].map((cell) => cell.textContent.trim()));
  }
  return parseCsv(text);
}

async function parseXlsx(file) {
  if (!("DecompressionStream" in window)) {
    alert("当前浏览器不支持静态解析 .xlsx，请改用导出的 .xls 或另存为 CSV 后导入。");
    return [];
  }
  const entries = await unzipXlsx(await file.arrayBuffer());
  const workbookXml = entries.get("xl/workbook.xml");
  const relsXml = entries.get("xl/_rels/workbook.xml.rels");
  if (!workbookXml || !relsXml) return [];
  const parser = new DOMParser();
  const workbook = parser.parseFromString(workbookXml, "application/xml");
  const rels = parser.parseFromString(relsXml, "application/xml");
  const firstSheet = workbook.querySelector("sheet");
  const relId = firstSheet?.getAttribute("r:id");
  const rel = [...rels.querySelectorAll("Relationship")].find((item) => item.getAttribute("Id") === relId);
  const target = rel?.getAttribute("Target") || "worksheets/sheet1.xml";
  const sheetPath = target.startsWith("/") ? target.slice(1) : `xl/${target.replace(/^xl\//, "")}`;
  const sheetXml = entries.get(sheetPath);
  if (!sheetXml) return [];
  const sharedStrings = parseSharedStrings(entries.get("xl/sharedStrings.xml") || "");
  return parseSheetXml(sheetXml, sharedStrings);
}

async function unzipXlsx(buffer) {
  const bytes = new Uint8Array(buffer);
  const view = new DataView(buffer);
  const eocdOffset = findEndOfCentralDirectory(view);
  if (eocdOffset < 0) throw new Error("Invalid xlsx file");
  const entryCount = view.getUint16(eocdOffset + 10, true);
  const centralOffset = view.getUint32(eocdOffset + 16, true);
  const decoder = new TextDecoder();
  const entries = new Map();
  let offset = centralOffset;
  for (let i = 0; i < entryCount; i += 1) {
    if (view.getUint32(offset, true) !== 0x02014b50) break;
    const method = view.getUint16(offset + 10, true);
    const compressedSize = view.getUint32(offset + 20, true);
    const fileNameLength = view.getUint16(offset + 28, true);
    const extraLength = view.getUint16(offset + 30, true);
    const commentLength = view.getUint16(offset + 32, true);
    const localOffset = view.getUint32(offset + 42, true);
    const fileName = decoder.decode(bytes.slice(offset + 46, offset + 46 + fileNameLength));
    const localNameLength = view.getUint16(localOffset + 26, true);
    const localExtraLength = view.getUint16(localOffset + 28, true);
    const dataStart = localOffset + 30 + localNameLength + localExtraLength;
    const compressed = bytes.slice(dataStart, dataStart + compressedSize);
    const content = method === 0 ? compressed : await inflateRaw(compressed);
    entries.set(fileName, decoder.decode(content));
    offset += 46 + fileNameLength + extraLength + commentLength;
  }
  return entries;
}

function findEndOfCentralDirectory(view) {
  for (let offset = view.byteLength - 22; offset >= Math.max(0, view.byteLength - 66000); offset -= 1) {
    if (view.getUint32(offset, true) === 0x06054b50) return offset;
  }
  return -1;
}

async function inflateRaw(bytes) {
  const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream("deflate-raw"));
  return new Uint8Array(await new Response(stream).arrayBuffer());
}

function parseSharedStrings(xml) {
  if (!xml) return [];
  const doc = new DOMParser().parseFromString(xml, "application/xml");
  return [...doc.querySelectorAll("si")].map((si) => [...si.querySelectorAll("t")].map((t) => t.textContent).join(""));
}

function parseSheetXml(xml, sharedStrings) {
  const doc = new DOMParser().parseFromString(xml, "application/xml");
  const rows = [];
  doc.querySelectorAll("sheetData row").forEach((row) => {
    const output = [];
    row.querySelectorAll("c").forEach((cell) => {
      const col = columnIndex(cell.getAttribute("r") || "");
      const type = cell.getAttribute("t");
      let value = "";
      if (type === "inlineStr") {
        value = [...cell.querySelectorAll("is t")].map((item) => item.textContent).join("");
      } else {
        value = cell.querySelector("v")?.textContent ?? "";
        if (type === "s") value = sharedStrings[Number(value)] ?? "";
      }
      output[col] = value;
    });
    rows.push(output.map((cell) => cell ?? ""));
  });
  return rows;
}

function columnIndex(ref) {
  const letters = ref.replace(/[^A-Z]/g, "");
  return [...letters].reduce((sum, letter) => sum * 26 + letter.charCodeAt(0) - 64, 0) - 1;
}

function parseCsv(text) {
  const rows = [];
  let row = [];
  let cell = "";
  let quoted = false;
  for (let index = 0; index < text.length; index += 1) {
    const char = text[index];
    const next = text[index + 1];
    if (char === '"' && quoted && next === '"') {
      cell += '"';
      index += 1;
    } else if (char === '"') {
      quoted = !quoted;
    } else if (char === "," && !quoted) {
      row.push(cell.trim());
      cell = "";
    } else if ((char === "\n" || char === "\r") && !quoted) {
      if (char === "\r" && next === "\n") index += 1;
      row.push(cell.trim());
      if (row.some(Boolean)) rows.push(row);
      row = [];
      cell = "";
    } else {
      cell += char;
    }
  }
  row.push(cell.trim());
  if (row.some(Boolean)) rows.push(row);
  return rows;
}

function normalizeImportedRows(rows) {
  const cleanRows = rows.filter((row) => row.some((cell) => String(cell ?? "").trim()));
  const headerIndex = cleanRows.findIndex((row) => row.some((cell) => /学号|序号/i.test(String(cell))) || row.some((cell) => /姓名/.test(String(cell))));
  const header = headerIndex >= 0 ? cleanRows[headerIndex] : [];
  const body = headerIndex >= 0 ? cleanRows.slice(headerIndex + 1) : cleanRows;
  const detectedNameIndex = detectNameIndex(body);
  const detectedIdIndex = detectIdIndex(body, detectedNameIndex);
  const idIndex = Math.max(0, header.findIndex((cell) => /学号|序号/i.test(String(cell))));
  const nameHeaderIndex = header.findIndex((cell) => /姓名/.test(String(cell)));
  const nameIndex = nameHeaderIndex >= 0 ? nameHeaderIndex : detectedNameIndex;
  const finalIdIndex = idIndex >= 0 ? idIndex : detectedIdIndex;
  const scoreIndexes = detectScoreIndexes(body, finalIdIndex, nameIndex).map((index, order) => ({
    cell: String(header[index] || defaultTests[order] || `第${order + 1}次`).trim(),
    index,
  }));
  const nextTests = scoreIndexes.map(({ cell }, index) => cell || `第${index + 1}次`);
  const nextStudents = body
    .map((row, index) => {
      const id = parseNumber(row[finalIdIndex]) ?? index + 1;
      const name = String(row[nameIndex] ?? "").trim();
      const scores = scoreIndexes.map(({ index: scoreIndex }) => parseNumber(row[scoreIndex]));
      return name ? { id, name, scores } : null;
    })
    .filter(Boolean);
  return { tests: nextTests, students: nextStudents };
}

function detectNameIndex(rows) {
  const maxCols = Math.max(...rows.map((row) => row.length), 0);
  let best = 1;
  let bestCount = -1;
  for (let col = 0; col < maxCols; col += 1) {
    const count = rows.filter((row) => {
      const value = String(row[col] ?? "").trim();
      return value && parseNumber(value) === null;
    }).length;
    if (count > bestCount) {
      best = col;
      bestCount = count;
    }
  }
  return best;
}

function detectIdIndex(rows, nameIndex) {
  const maxCols = Math.max(...rows.map((row) => row.length), 0);
  for (let col = 0; col < maxCols; col += 1) {
    if (col === nameIndex) continue;
    const values = rows.map((row) => parseNumber(row[col])).filter((value) => value !== null);
    if (values.length >= Math.min(10, rows.length) && values.every((value) => Number.isInteger(value) && value >= 0 && value <= 100)) return col;
  }
  return 0;
}

function detectScoreIndexes(rows, idIndex, nameIndex) {
  const maxCols = Math.max(...rows.map((row) => row.length), 0);
  const indexes = [];
  for (let col = 0; col < maxCols; col += 1) {
    if (col === idIndex || col === nameIndex) continue;
    const values = rows.map((row) => parseNumber(row[col])).filter((value) => value !== null);
    if (values.length >= Math.max(2, Math.floor(rows.length * 0.45)) && values.every((value) => value >= 0 && value <= 150)) indexes.push(col);
  }
  return indexes;
}

function render(options = {}) {
  const studentName = currentStudentName();
  if (studentName) {
    renderStudent(studentName, options);
  } else {
    overview(options);
  }
}

window.addEventListener("hashchange", render);
render();
